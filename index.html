<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online JSEA Form - Sankei System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        input, textarea { background: #1e293b !important; border: 1px solid #334155 !important; color: white !important; transition: all 0.2s; }
        input:focus { border-color: #38bdf8 !important; box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-6xl mx-auto glass-card rounded-2xl shadow-2xl overflow-hidden">
        <div class="bg-sky-600 p-6 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-bold">Digital JSEA Form</h1>
                <p class="text-sky-100 text-sm">Input Job Safety Environmental Analysis Online</p>
            </div>
            <div class="text-right text-xs opacity-80">
                <p>FORM/SDI/SHE/01/004/R-00</p>
                <p>Status: Online</p>
            </div>
        </div>

        <form id="jseaForm" class="p-6 md:p-10 space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">JSEA No.</label>
                        <input type="text" id="jsea_no" required class="w-full rounded-lg px-4 py-2.5">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Nama Kontraktor</label>
                        <input type="text" id="contractor" required class="w-full rounded-lg px-4 py-2.5">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Departemen</label>
                        <input type="text" id="dept" required class="w-full rounded-lg px-4 py-2.5">
                    </div>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Nama Pekerjaan</label>
                        <input type="text" id="job_name" required class="w-full rounded-lg px-4 py-2.5">
                    </div>
                    <div>
                        <label class="block text-xs font-semibold uppercase text-slate-400 mb-1">Tanggal Pelaksanaan</label>
                        <input type="date" id="job_date" required class="w-full rounded-lg px-4 py-2.5">
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto rounded-xl border border-slate-700">
                <table class="w-full text-left">
                    <thead class="bg-slate-800 text-slate-300 text-xs uppercase">
                        <tr>
                            <th class="p-4 border-b border-slate-700 w-12">No</th>
                            <th class="p-4 border-b border-slate-700">Langkah Kerja & Resiko</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-700">
                        </tbody>
                </table>
            </div>

            <button type="button" onclick="addRow()" class="text-sky-400 text-sm font-medium hover:text-sky-300 transition">+ Tambah Urutan Kerja</button>

            <div>
                <label class="block text-xs font-semibold uppercase text-slate-400 mb-2">APD yang Dibutuhkan</label>
                <textarea id="apd_list" class="w-full rounded-lg px-4 py-3 h-24" placeholder="Contoh: Safety Helmet, Vest, Earplug..."></textarea>
            </div>

            <div class="flex justify-end border-t border-slate-700 pt-8">
                <button type="submit" id="submitBtn" class="bg-sky-500 hover:bg-sky-400 text-white px-10 py-3 rounded-xl font-bold shadow-lg shadow-sky-500/20 transition-all active:scale-95">
                    Kirim JSEA Online
                </button>
            </div>
        </form>
    </div>

    <script>
        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = 'URL_PROYEK_ANDA';
        const SUPABASE_KEY = 'API_KEY_ANON_ANDA';
        const supabase = collections.createClient(SUPABASE_URL, SUPABASE_KEY);

        let rowCount = 0;
        function addRow() {
            rowCount++;
            const tbody = document.getElementById('tableBody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td class="p-4 text-center font-bold text-slate-500">${rowCount}</td>
                <td class="p-4">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <textarea class="step_desc p-2 text-sm rounded bg-slate-900 border border-slate-700" placeholder="Urutan kerja" rows="2"></textarea>
                        <textarea class="step_hazard p-2 text-sm rounded bg-slate-900 border border-slate-700" placeholder="Bahaya & Resiko" rows="2"></textarea>
                        <textarea class="step_action col-span-1 md:col-span-2 p-2 text-sm rounded bg-slate-900 border border-slate-700" placeholder="Tindakan Rekomendasi" rows="2"></textarea>
                    </div>
                </td>
            `;
            tbody.appendChild(row);
        }

        // Mulai dengan 2 baris
        for(let i=0; i<2; i++) addRow();

        // Handle Submit
        document.getElementById('jseaForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = 'Mengirim...';

            // Ambil data detail (table)
            const steps = [];
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach((row, index) => {
                steps.push({
                    no: index + 1,
                    desc: row.querySelector('.step_desc').value,
                    hazard: row.querySelector('.step_hazard').value,
                    action: row.querySelector('.step_action').value
                });
            });

            const formData = {
                jsea_no: document.getElementById('jsea_no').value,
                job_name: document.getElementById('job_name').value,
                contractor: document.getElementById('contractor').value,
                dept: document.getElementById('dept').value,
                job_date: document.getElementById('job_date').value,
                apd: document.getElementById('apd_list').value,
                analysis_details: steps, // Data tabel disimpan dalam bentuk JSON
                created_at: new Date()
            };

            // Simpan ke Tabel Supabase (Nama tabel: 'jsea_records')
            const { error } = await supabase.from('jsea_records').insert([formData]);

            if (error) {
                alert('Gagal mengirim: ' + error.message);
            } else {
                alert('JSEA Berhasil dikirim secara online!');
                location.reload();
            }
            btn.disabled = false;
            btn.innerText = 'Kirim JSEA Online';
        };
    </script>
</body>
</html>
